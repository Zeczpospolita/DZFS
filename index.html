<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>DZFS 0.4</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="style.css">
    <script async src="https://docs.opencv.org/4.x/opencv.js"></script>
    <script src='main.js' defer></script>
</head>
<body>
    <div id="background"></div>
    <div id="flashWhite"></div>
    <div id="flashRed"></div>
    <video id="video" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
    <canvas id="preview"></canvas>
    <button id="counter">0</button>

    <div id="container1">
        <button id="calibration"><img class="icons" src="icons/calibration.png"></button>
        <button id="reset"><img class="icons" src="icons/reset.png"></button>
        <button id="crop_start"><img class="icons" src="icons/crop_start.png"></button>
        <button id="crop_stop"><img class="icons" src="icons/crop_stop.png"></button>
        <button id="aspect_ratio">16:9</button>
    </div>
    <button id="record_start"><img class="icons" src="icons/record_start.png"></button>
    <button id="record_stop"><img class="icons" src="icons/record_stop.png"></button>

</body>
</html>
